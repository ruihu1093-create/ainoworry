name: Auto Update AI Data

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 设置超时时间
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch AI data
        run: python3 fetch_data.py
        continue-on-error: true

      - name: Health check
        run: |
          if [ -f data.json ]; then
            echo "✓ data.json exists"
            python3 -c "import json; data=json.load(open('data.json')); print(f'✓ Data valid: {len(data.get(\"news\",[]))} news, {len(data.get(\"products\",[]))} products')"
          else
            echo "✗ data.json missing"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "✓ Data updated successfully"
          fi
