name: Auto Update AI Data

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AI data
        run: python3 fetch_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: auto update $(date -u +%Y-%m-%d)" && git push)
