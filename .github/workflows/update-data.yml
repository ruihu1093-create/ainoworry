name: Auto Update AI Data

on:
  schedule:
    # 每天 UTC 0:00, 6:00, 12:00, 18:00 运行（对应北京时间 8:00, 14:00, 20:00, 次日2:00）
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch AI data
        run: python fetch_data.py

      - name: Check if data changed
        id: diff
        run: |
          if git diff --quiet data.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: auto update AI data $(date '+%Y-%m-%d %H:%M UTC')"
          git push
